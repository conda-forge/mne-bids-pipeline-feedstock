{% set python_min = "3.10" %}
{% set name = "mne-bids-pipeline" %}
{% set version = "1.10.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 665c6b10c15a07851f1f011ffac428715e23a3b16540c1ac8dc1ce6af9308b70

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  entry_points:
    - mne_bids_pipeline = mne_bids_pipeline._main:main

requirements:
  host:
    - pip
    - hatchling
    - hatch-vcs
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - psutil
    - packaging
    - joblib >=0.14
    - threadpoolctl
    - dask
    - bokeh
    - jupyter-server-proxy
    - scikit-learn
    - numpy
    - scipy
    - matplotlib-base
    - pandas
    - pyarrow
    - seaborn
    - json_tricks
    - rich
    - python-picard
    - qtpy
    - pyvista
    - pyvistaqt
    - openpyxl
    - autoreject
    - mne-base >=1.7
    - h5io
    - mne-bids
    - nibabel
    - filelock
    - pydantic >=2.0.0
    - annotated-types
    - tqdm

test:
  imports:
    - mne_bids_pipeline
  commands:
    - pip check
    - mne_bids_pipeline --version
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/mne-bids-pipeline/
  summary: A standardized processing pipeline for your MEG and EEG data
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - larsoner
    - hoechenberger
